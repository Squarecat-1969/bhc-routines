name: Late Edition

# Manual dispatch only — the cron trigger is intentionally still commented
# out. The full eight-pass orchestrator (src/passes/orchestrator/) is now
# built, tested, and live-verified end to end at real production scale
# (2026-07-19: a full --live run completed cleanly in ~8m49s, zero warnings,
# zero aborts — see CLAUDE.md and docs/late-edition-orchestrator-notes.md).
# Enabling the schedule is a deliberate decision for Bobby to make, not a
# default to flip once the code works.
#
# When it is time to wire the schedule, read docs/pass4-notes.md #1 first:
# GitHub Actions cron is always UTC and does NOT observe DST, so a single
# expression cannot hold "11:00 PM PDT/PST, Sunday-Thursday" year-round.
#
#   11:00 PM PDT (UTC-7, ~Mar-Nov) = 06:00 UTC the NEXT day  -> '0 6 * * 1-5'
#   11:00 PM PST (UTC-8, ~Nov-Mar) = 07:00 UTC the NEXT day  -> '0 7 * * 1-5'
#
# Note the day shift: a Sunday-Thursday run in Los Angeles is Monday-Friday in
# UTC. Using '* * 0-4' would fire on the wrong days.
#
# on:
#   schedule:
#     - cron: '0 6 * * 1-5'   # 11pm PDT Sun-Thu (summer)
#     - cron: '0 7 * * 1-5'   # 11pm PST Sun-Thu (winter)
#   Both fire year-round unless the job itself checks the local hour and exits.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'dry-run computes and logs without writing anywhere; live runs the real thing (Sheets, Attio, #aida)'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - live
      limit:
        description: 'Optional cap on items processed per pass, where supported (PASS 2/2.5/4/4.5) — blank = all. PASS 0/1/3/5 always run unlimited regardless.'
        required: false
        type: string

concurrency:
  # Never let two runs write to the same records at once — every pass in the
  # chain writes somewhere (Sheets, Attio, or both).
  group: late-edition
  cancel-in-progress: false

jobs:
  late-edition:
    name: Late Edition — all eight passes
    runs-on: ubuntu-latest
    # A full --live run at real production scale took ~8m49s (2026-07-19).
    # Generous margin above that for LLM latency variance, retry backoff on
    # a bad network night, and CI setup overhead (checkout/npm ci/typecheck/test).
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - name: Run Late Edition
        env:
          BRAIN_API_TOKEN: ${{ secrets.BRAIN_API_TOKEN }}
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_BHC_ROUTINES_API: ${{ secrets.ANTHROPIC_BHC_ROUTINES_API }}
          RUN_TIMEZONE: UTC
        run: |
          FLAGS="--json-out out/late-edition-report.json"
          if [ "${{ inputs.mode }}" = "live" ]; then FLAGS="$FLAGS --live"; else FLAGS="$FLAGS --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then FLAGS="$FLAGS --limit ${{ inputs.limit }}"; fi
          npx tsx src/cli/run-late-edition.ts $FLAGS

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: late-edition-report-${{ github.run_id }}
          path: out/late-edition-report.json
          # Contains contact names, thread summaries, and draft reply text —
          # keep the retention window short.
          retention-days: 7
          if-no-files-found: warn
